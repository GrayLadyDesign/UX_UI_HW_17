<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet" type="text/css">
  <title>Amanda Fullers Portfolio</title>
</head>
<body>
  <nav id="navBar">
    <img src="Images/GrayLady_Logo_Gray copy.png" alt="GrayLady_Logo_Gray" width="200" height="200">
    <div id="navigation">
      <link href="https://fonts.googleapis.com/css2?family=Mohave:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
      <p class="highlight">Home</p>
      <p>About</p>
      <p>Resume</p>
    </div>
    <div class="icons">
      <img src="images/user.png">
      <img src="images/search.png">
      <img src="images/shopping-bag.png">
    </div>
  </nav>
  <section id="heroGrid">
    <div id="work" class="heroGridArea">
      <div id="headline">
        <h3 id="intro">Creating a moment to introduce myself...</h3>
        <h2>Amanda Fuller</h2>
        <p>UX Designer & Illustrator</p>
      </div>
    </div>
    <div id="secondaryProduct" class="heroGridArea"></div>
    <div id="CTA" class="heroGridArea">
      <h4>View my work below</h4>
      <img src="images/arrow-right.png">
    </div>
  </section>
  <div class="subHeading">
    <h3>Case Studies</h3>
  </div>
  <section id="categoryGrid">
    <div id="caseStudy1" class="categoryGridArea">
      <div class="heading">Tracy Aviary</div>
      <p>UI Redesign</p>
    </div>
    <div id="caseStudy2" class="categoryGridArea">
      <div class="heading">Simply Bundled</div>
      <p>Product Design</p>
    </div>
    <div id="caseStudy3" class="categoryGridArea">
      <div class="heading">Liaison Travel App</div>
      <p>UX Design</p>

    </div>
  </section>
</body>
</html>
